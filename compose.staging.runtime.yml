services:
  app:
    image: ${APP_IMAGE}
    environment:
      APP_ENV: staging
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}

      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: sync

      RUN_MIGRATIONS: "true"
    networks:
      - web

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/fpm.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web

networks:
  web:
