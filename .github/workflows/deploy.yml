name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: production-deployment
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH credentials
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to VPS
        run: |
          set -e
          ssh -i ~/.ssh/deploy_key \
            -o ConnectTimeout=10 \
            -o BatchMode=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            bash -s "${{ secrets.VPS_APP_PATH }}" "${{ github.repository }}" "${{ github.ref_name }}" <<'DEPLOY_SCRIPT'
          
          APP_PATH="$1"
          REPO_URL="https://github.com/$2.git"
          BRANCH="$3"
          
          # Clone or update repository
          if [ ! -d "$APP_PATH/.git" ]; then
            git clone "$REPO_URL" "$APP_PATH"
          fi
          
          cd "$APP_PATH"
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh "$APP_PATH" "$REPO_URL" "$BRANCH"
          
          DEPLOY_SCRIPT
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

      - name: Verify deployment
        run: |
          set -e
          MAX_ATTEMPTS=30
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            RUNNING=$(ssh -i ~/.ssh/deploy_key -o ConnectTimeout=5 -o BatchMode=yes \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "cd ${{ secrets.VPS_APP_PATH }} && docker compose ps --filter 'status=running' -q | wc -l" 2>/dev/null || echo "0")
            TOTAL=$(ssh -i ~/.ssh/deploy_key -o ConnectTimeout=5 -o BatchMode=yes \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "cd ${{ secrets.VPS_APP_PATH }} && docker compose ps -q | wc -l" 2>/dev/null || echo "0")
            
            [ "$RUNNING" -eq "$TOTAL" ] && [ "$TOTAL" -gt 0 ] && break
            [ $ATTEMPT -eq $MAX_ATTEMPTS ] && { echo "ERROR: Containers failed to start"; exit 1; }
            
            sleep 10
          done

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Success notification
        if: success()
        run: echo "✓ Deployment completed: ${{ github.ref_name }} (${{ github.sha }})"

      - name: Failure notification
        if: failure()
        run: |
          echo "✗ Deployment failed"
          exit 1
