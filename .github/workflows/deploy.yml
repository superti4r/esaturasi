name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from secrets
        run: |
          cp .env.example .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          echo "APP_URL=${{ secrets.APP_URL }}" >> .env
          echo "APP_ENV=production" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" >> .env
          echo "GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" >> .env
          echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
          echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.APP_KEY }}" ]; then
            echo "❌ Error: APP_KEY secret not set"
            exit 1
          fi
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then
            echo "❌ Error: DB_PASSWORD secret not set"
            exit 1
          fi
          echo "✓ All required secrets are configured"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: esaturasi:latest
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load image for testing
        run: |
          docker load --input /tmp/image.tar

      - name: Run tests (optional)
        run: docker compose run --rm app php artisan test || true

      - name: Generate Filament Shield permissions
        run: |
          docker compose run --rm app php artisan shield:generate --all

      - name: Push images to Docker Hub
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/esaturasi:latest
            ${{ secrets.DOCKER_USERNAME }}/esaturasi:${{ github.sha }}
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

  deploy-vps:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e

          cd ${{ secrets.VPS_APP_PATH }}

          git fetch origin
          git checkout ${{ github.ref_name }}

          cp .env.example .env

          if [ ! -f .env.production ]; then
            cat > .env.production << ENVEOF
          APP_KEY=${{ secrets.APP_KEY }}
          APP_URL=${{ secrets.APP_URL }}
          APP_ENV=production
          APP_DEBUG=false
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          ENVEOF
            cp .env.production .env
          fi

          docker compose pull
          docker compose up -d
          docker compose exec -T app php artisan migrate --force
          docker compose exec -T app php artisan shield:generate --all
          docker compose exec -T app php artisan config:cache
          docker compose exec -T app php artisan route:cache
          docker compose exec -T app php artisan view:cache

          if ! docker compose exec -T app php artisan tinker <<'TINKEREOF' 2>/dev/null | grep -q "admin"; 
            use Spatie\Permission\Models\Role;
            echo Role::where('name', 'super_admin')->exists() ? "admin" : "none";
            exit(0);
          TINKEREOF
          then
            echo "Setting up Super Admin user..."
            docker compose exec -T app php artisan shield:super-admin --user=1 --panel=admin
          fi

          echo "Deployment completed successfully"
          EOF

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          docker compose -f ${{ secrets.VPS_APP_PATH }}/docker-compose.yml ps
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
