name: Production CI/CD

on:
  push:
    branches:
      - staging

concurrency:
  group: production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image_meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=sha,prefix=,format=long
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image_meta.outputs.tags }}
          labels: ${{ steps.image_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${VPS_SSH_KEY}" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          echo "${VPS_KNOWN_HOSTS}" > ~/.ssh/known_hosts
      - id: env_file
        run: |
          ENV_CONTENT=$(cat <<EOF
          APP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          APP_NAME="${{ secrets.APP_NAME }}"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}
          LOG_CHANNEL=stderr
          LOG_LEVEL=error
          DB_CONNECTION=mysql
          DB_HOST=mysql
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.DB_DATABASE }}
          MYSQL_USER=${{ secrets.DB_USERNAME }}
          MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }}
          CACHE_DRIVER=redis
          QUEUE_CONNECTION=redis
          SESSION_DRIVER=redis
          REDIS_HOST=redis
          REDIS_PASSWORD=null
          REDIS_PORT=6379
          MYSQL_EXPORTER_USER=${{ secrets.MYSQL_EXPORTER_USER }}
          MYSQL_EXPORTER_PASSWORD=${{ secrets.MYSQL_EXPORTER_PASSWORD }}
          GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          EOF
          )
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$ENV_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Deploy to Server
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENV_PRODUCTION: ${{ steps.env_file.outputs.content }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "VPS_PATH='${VPS_PATH}'" \
            "GHCR_USERNAME='${GHCR_USERNAME}'" \
            "GHCR_TOKEN='${GHCR_TOKEN}'" \
            "ENV_PRODUCTION='${ENV_PRODUCTION}'" \
            'bash -s' << 'EOF'
          set -euo pipefail
          cd "${VPS_PATH}"
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          echo "${ENV_PRODUCTION}" > .env.production
          chmod 600 .env.production
          rsync -a --delete ./docker/ ./docker-sync/
          docker compose -f docker-compose.prod.yml pull
          trap 'echo "--- DEPLOYMENT FAILED ---"; docker compose -f docker-compose.prod.yml ps -a; docker compose -f docker-compose.prod.yml logs --tail=100; exit 1' ERR
          docker compose -f docker-compose.prod.yml up -d --remove-orphans --wait
          trap - ERR
          docker compose exec -T app php artisan storage:link
          docker compose exec -T app php artisan migrate --force
          docker compose exec -T app php artisan optimize:clear
          docker image prune -af --filter "until=168h"
          echo "✅ Deployment successful!"
          docker compose ps
          EOF
