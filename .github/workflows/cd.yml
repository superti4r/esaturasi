name: Test and Deploy to Staging

on:
  push:
    branches: ["staging"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Create .env.staging from secret
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.ENV_STAGING_FILE }}" ]; then
            echo "ENV_STAGING_FILE secret is missing (Environment: staging)." >&2
            exit 1
          fi
          printf '%s' '${{ secrets.ENV_STAGING_FILE }}' > .env.staging
          ls -la .env.staging

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.staging
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            echo "Pulling latest image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

            docker stop esaturasi-staging || true
            docker rm esaturasi-staging || true

            # Run app (FrankenPHP listens on 8000)
            docker run -d \
              --name esaturasi-staging \
              -p 8080:8000 \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

            # Run migrations
            docker exec esaturasi-staging php artisan migrate --force || true

            echo "Cleaning up old images..."
            docker image prune -f

