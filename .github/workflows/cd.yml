name: Staging Deploy

on:
  push:
    branches: ["staging"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          progress: plain
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy via SSH (write env & run docker compose)
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p ~/apps/esaturasi-staging/docker/nginx
            mkdir -p ~/apps/esaturasi-staging/storage ~/apps/esaturasi-staging/bootstrap/cache
            cd ~/apps/esaturasi-staging

            # write runtime .env with secrets (DB is expected to be external)
            cat > .env << 'ENV'
            APP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            APP_ENV=staging
            APP_DEBUG=false
            APP_URL=${{ secrets.APP_URL }}
            APP_KEY=${{ secrets.APP_KEY }}

            DB_CONNECTION=mysql
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            ENV

            # write minimal nginx config for PHP-FPM
            cat > docker/nginx/default.conf << 'NGINX'
            server {
                listen 80;
                server_name _;
                root /var/www/html/public;
                index index.php index.html;
                client_max_body_size 50m;
                location / {
                    try_files $uri $uri/ /index.php?$query_string;
                }
                location ~ \.php$ {
                    include fastcgi_params;
                    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                    fastcgi_param PATH_INFO $fastcgi_path_info;
                    fastcgi_index index.php;
                    fastcgi_pass app:9000;
                }
            }
            NGINX

            # create minimal docker compose using the pushed image and external DB
            cat > compose.yml << 'YML'
            services:
              app:
                image: ${APP_IMAGE}
                env_file: .env
                volumes:
                  - ./storage:/var/www/html/storage
                  - ./bootstrap/cache:/var/www/html/bootstrap/cache
                networks:
                  - web

              nginx:
                image: nginx:1.27-alpine
                depends_on:
                  - app
                ports:
                  - "8080:80"
                volumes:
                  - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
                networks:
                  - web

            networks:
              web:

            volumes:
              storage:
              bootstrap_cache:
            YML

            docker compose -f compose.yml pull || true
            docker compose -f compose.yml up -d --remove-orphans

