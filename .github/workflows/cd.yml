name: Test and Deploy to Staging

on:
  push:
    branches: ["staging"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.fpm
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p ~/apps/esaturasi-staging
            cd ~/apps/esaturasi-staging

            # write runtime env (from secrets)
            cat > .env << 'ENV'
            APP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            APP_URL=${{ secrets.APP_URL }}
            APP_KEY=${{ secrets.APP_KEY }}

            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            ENV

            # ensure nginx config & compose exist
            if [ ! -f docker/nginx/fpm.conf ]; then
              mkdir -p docker/nginx
              cat > docker/nginx/fpm.conf << 'NGINX'
              server {
                  listen 80;
                  server_name _;
                  root /var/www/html/public;
                  index index.php index.html;
                  client_max_body_size 50m;
                  location / { try_files $uri $uri/ /index.php?$query_string; }
                  location ~ \\.php$ {
                      include fastcgi_params;
                      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                      fastcgi_index index.php;
                      fastcgi_pass app:9000;
                  }
              }
              NGINX
            fi

            if [ ! -f compose.yml ]; then
              cat > compose.yml << 'YML'
              services:
                app:
                  image: ${APP_IMAGE}
                  environment:
                    APP_ENV: staging
                    APP_DEBUG: "false"
                    APP_URL: ${APP_URL}
                    APP_KEY: ${APP_KEY}
                    DB_CONNECTION: mysql
                    DB_HOST: ${DB_HOST}
                    DB_PORT: ${DB_PORT}
                    DB_DATABASE: ${DB_DATABASE}
                    DB_USERNAME: ${DB_USERNAME}
                    DB_PASSWORD: ${DB_PASSWORD}
                    CACHE_STORE: database
                    SESSION_DRIVER: database
                    QUEUE_CONNECTION: sync
                    RUN_MIGRATIONS: "true"
                  networks:
                    - web

                nginx:
                  image: nginx:1.27-alpine
                  depends_on:
                    - app
                  ports:
                    - "8080:80"
                  volumes:
                    - ./docker/nginx/fpm.conf:/etc/nginx/conf.d/default.conf:ro
                  networks:
                    - web

              networks:
                web:
              YML
            fi

            docker compose -f compose.yml pull
            docker compose -f compose.yml up -d --remove-orphans

