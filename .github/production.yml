name: Production CI/CD

on:
  push:
    branches:
      - staging

concurrency:
  group: production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test Laravel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, sqlite, pdo_sqlite, bcmath, intl, gd, zip
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Testing Env
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear

      - name: Run Tests
        run: php artisan test

  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize Image Name
        id: image
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.sha }}
            ${{ steps.image.outputs.image }}:production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "$VPS_KNOWN_HOSTS" ]; then
            echo "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Upload Deployment Files
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p $VPS_PATH"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $VPS_PORT" \
            docker-compose.prod.yml docker \
            "$VPS_USER@$VPS_HOST:$VPS_PATH/"

      - name: Deploy
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}

          IMAGE: ${{ needs.build.outputs.image }}
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          APP_NAME: ${{ secrets.APP_NAME }}
          APP_ENV: production
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}

          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}

          MYSQL_EXPORTER_USER: ${{ secrets.MYSQL_EXPORTER_USER }}
          MYSQL_EXPORTER_PASSWORD: ${{ secrets.MYSQL_EXPORTER_PASSWORD }}

          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            IMAGE="$IMAGE" \
            IMAGE_TAG="$IMAGE_TAG" \
            GHCR_USERNAME="$GHCR_USERNAME" \
            GHCR_TOKEN="$GHCR_TOKEN" \
            APP_NAME="$APP_NAME" \
            APP_KEY="$APP_KEY" \
            APP_URL="$APP_URL" \
            DB_DATABASE="$DB_DATABASE" \
            DB_USERNAME="$DB_USERNAME" \
            DB_PASSWORD="$DB_PASSWORD" \
            MYSQL_ROOT_PASSWORD="$MYSQL_ROOT_PASSWORD" \
            MYSQL_EXPORTER_USER="$MYSQL_EXPORTER_USER" \
            MYSQL_EXPORTER_PASSWORD="$MYSQL_EXPORTER_PASSWORD" \
            GRAFANA_ADMIN_USER="$GRAFANA_ADMIN_USER" \
            GRAFANA_ADMIN_PASSWORD="$GRAFANA_ADMIN_PASSWORD" \
            VPS_PATH="$VPS_PATH" \
            'bash -s' << 'EOF'
          set -e

          cd "$VPS_PATH"

          cat > .env.production << ENV
          APP_IMAGE=${IMAGE}:${IMAGE_TAG}

          APP_NAME=${APP_NAME}
          APP_ENV=production
          APP_KEY=${APP_KEY}
          APP_DEBUG=false
          APP_URL=${APP_URL}

          LOG_CHANNEL=stderr
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=mysql
          DB_PORT=3306
          DB_DATABASE=${DB_DATABASE}
          DB_USERNAME=${DB_USERNAME}
          DB_PASSWORD=${DB_PASSWORD}

          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE=${DB_DATABASE}
          MYSQL_USER=${DB_USERNAME}
          MYSQL_PASSWORD=${DB_PASSWORD}

          MYSQL_EXPORTER_USER=${MYSQL_EXPORTER_USER}
          MYSQL_EXPORTER_PASSWORD=${MYSQL_EXPORTER_PASSWORD}

          CACHE_STORE=database
          SESSION_DRIVER=database
          QUEUE_CONNECTION=database

          GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
          ENV

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

          docker compose -f docker-compose.prod.yml --env-file .env.production pull
          docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans

          docker compose -f docker-compose.prod.yml --env-file .env.production exec -T app php artisan storage:link || true
          docker compose -f docker-compose.prod.yml --env-file .env.production exec -T app php artisan migrate --force
          docker compose -f docker-compose.prod.yml --env-file .env.production exec -T app php artisan optimize:clear
          docker compose -f docker-compose.prod.yml --env-file .env.production exec -T app php artisan optimize

          docker image prune -af --filter "until=168h"

          docker compose -f docker-compose.prod.yml --env-file .env.production ps
          EOF
