version: '3.9'

services:
    db:
        image: mysql:8.0
        container_name: esaturasi-db
        labels:
            com.esaturasi.description: "MySQL Database"
            com.esaturasi.version: "8.0"
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - db_data:/var/lib/mysql
        restart: unless-stopped
        networks:
            - esaturasi-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            timeout: 20s
            retries: 10
            interval: 30s
            start_period: 40s

    redis:
        image: redis:7-alpine
        container_name: esaturasi-redis
        labels:
            com.esaturasi.description: "Redis Cache"
            com.esaturasi.version: "7-alpine"
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        restart: unless-stopped
        networks:
            - esaturasi-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            timeout: 3s
            retries: 5
            interval: 30s
            start_period: 10s

    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
            platforms:
                - linux/amd64
                - linux/arm64
        container_name: esaturasi
        labels:
            com.esaturasi.description: "eSaturasi Application"
            com.esaturasi.version: "1.0.0"
        ports:
            - "80:80"
            - "443:443"
        env_file:
            - .env
        environment:
            DB_HOST: db
            DB_PORT: 3306
            REDIS_HOST: redis
            REDIS_PORT: 6379
        volumes:
            - app_data:/var/www/html/storage
            - ./bootstrap/cache:/var/www/html/bootstrap/cache
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - esaturasi-network
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/health", "||", "exit", "1"]
            timeout: 3s
            retries: 3
            interval: 30s
            start_period: 40s

    prometheus:
        image: prom/prometheus:v2.51.1
        container_name: esaturasi-prometheus
        labels:
            com.esaturasi.description: "Prometheus Monitoring"
            com.esaturasi.version: "2.51.1"
        ports:
            - "9090:9090"
        volumes:
            - ./docker/services/prometheus.yml:/etc/prometheus/prometheus.yml
            - prometheus_data:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=30d'
        restart: unless-stopped
        networks:
            - esaturasi-network
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090"]
            timeout: 3s
            retries: 5
            interval: 30s
            start_period: 10s

    node_exporter:
        image: prom/node-exporter:v1.7.0
        container_name: esaturasi-node-exporter
        labels:
            com.esaturasi.description: "Node Exporter"
            com.esaturasi.version: "1.7.0"
        ports:
            - "9100:9100"
        volumes:
            - /proc:/host/proc:ro
            - /sys:/host/sys:ro
            - /:/rootfs:ro
        command:
            - '--path.procfs=/host/proc'
            - '--path.sysfs=/host/sys'
            - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
        restart: unless-stopped
        networks:
            - esaturasi-network

    graflabels:
            com.esaturasi.description: "Grafana Dashboard"
            com.esaturasi.version: "11.0.0"
        ports:
            - "3000:3000"
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
            - GF_INSTALL_PLUGINS=grafana-piechart-panel
            - GF_USERS_ALLOW_SIGN_UP=false
        volumes:
            - grafana_data:/var/lib/grafana
            - ./docker/services/grafana/provisioning:/etc/grafana/provisioning
        depends_on:
            - prometheus
        restart: unless-stopped
        networks:
            - esaturasi-network
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
            timeout: 3s
            retries: 5
            interval: 30s
            start_period: 10s
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
            timeout: 3s
            retries: 5

volumes:
    app_data:
    db_data:
    redis_data:
    prometheus_data:
    grafana_data:

networks:
    esaturasi-network:
        driver: bridge
