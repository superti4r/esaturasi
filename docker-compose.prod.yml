services:
  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
      - laravel_public:/var/www/html/public
    networks:
      - app_network

  queue:
    image: ${APP_IMAGE}
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    env_file:
      - .env.production
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
      - laravel_public:/var/www/html/public
    networks:
      - app_network

  scheduler:
    image: ${APP_IMAGE}
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file:
      - .env.production
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
      - laravel_public:/var/www/html/public
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - laravel_public:/var/www/html/public:ro
      - laravel_storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_network

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    networks:
      - app_network

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - app_network

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - app_network

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - app_network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - app_network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://nginx/nginx_status
    depends_on:
      nginx:
        condition: service_started
    networks:
      - app_network

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    restart: unless-stopped
    command:
      - --mysqld.address=mysql:3306
      - --mysqld.username=${MYSQL_EXPORTER_USER}
    environment:
      MYSQLD_EXPORTER_PASSWORD: ${MYSQL_EXPORTER_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
  laravel_storage:
  laravel_cache:
  laravel_public:
  prometheus_data:
  grafana_data:
